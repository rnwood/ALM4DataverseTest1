name: BUILD

# Triggers on every push to any branch, including the commit pushed by EXPORT.
# Also supports manual runs.
# Packs Dataverse solutions into deployable artifacts and tags the source commit.
#
# See docs/usage/building-releases.md and docs/setup/github-setup.md

run-name: ${{ format('{0}-{1}-{2}-{3}', github.event.repository.name, github.ref_name, github.event.head_commit.timestamp || github.event.repository.updated_at || github.run_id, github.run_number) }}

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    uses: rnwood/ALM4DataverseTest1Shared/.github/workflows/build.yml@main
    with:
      build-name: ${{ format('{0}-{1}-{2}-{3}', github.event.repository.name, github.ref_name, github.event.head_commit.timestamp || github.event.repository.updated_at || github.run_id, github.run_number) }}
      timeout-minutes: 360
    permissions:
      contents: write
      actions: write
